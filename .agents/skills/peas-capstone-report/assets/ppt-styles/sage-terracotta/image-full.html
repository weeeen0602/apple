<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F4F1DE; display: flex; flex-direction: column;
  font-family: Arial, Helvetica, sans-serif; box-sizing: border-box;
  overflow: hidden;
}
.bar { background: #87A96B; height: 10pt; width: 100%; flex-shrink: 0; }
.accent { color: #E07A5F; }
h1 { color: #87A96B; font-size: 32pt; margin: 0 0 12pt 0; }
h2 { color: #87A96B; font-size: 26pt; margin: 0 0 10pt 0; }
p { color: #E07A5F; font-size: 16pt; margin: 4pt 0; }
ul { color: #E07A5F; font-size: 16pt; margin: 0; padding-left: 20pt; }
li { margin-bottom: 6pt; }
img { object-fit: contain; }

.pad { padding: 20pt 32pt 24pt 32pt; flex: 1; display: flex; flex-direction: column; }
.img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
.img-wrap img { max-width: 640pt; max-height: 280pt; }
.caption p { font-size: 14pt; text-align: center; margin-top: 8pt; }
</style></head>
<body>
<div class="bar"></div>
<div class="pad">
  <h2>{{HEADING}}</h2>
  <div class="img-wrap"><img src="{{IMAGE_PATH}}" alt=""></div>
  <div class="caption">{{CAPTION_HTML}}</div>
</div></body></html>
